<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Blog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Calibri', 'Calibri Regular', sans-serif;
    background: #f5f5f0;
    color: #000;
    padding: 2rem 1rem;
    font-size: 16px;
    line-height: 1.6;
  }

  .blog-container {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1.5px solid #bbb;
  }

  header h1 {
    font-size: 2rem;
    font-weight: bold;
    color: #000;
  }

  header p {
    font-size: 0.95rem;
    color: #444;
    margin-top: 0.25rem;
  }

  /* ── TAG FILTER BAR ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 2rem;
    align-items: center;
  }

  .filter-label {
    font-size: 0.8rem;
    color: #555;
    margin-right: 4px;
  }

  .filter-tag {
    cursor: pointer;
    font-family: 'Calibri', sans-serif;
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: opacity 0.15s;
    color: #000;
  }

  .filter-tag.active { font-weight: bold; }
  .filter-tag:hover { opacity: 0.75; }

  /* ── POST CARD ── */
  .post {
    border-radius: 6px;
    border: 1.5px solid transparent;
    padding: 1.25rem 1.4rem;
    margin-bottom: 1.5rem;
  }

  .post-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .post-title-block { flex: 1; }

  .post-title {
    font-size: 1.15rem;
    font-weight: bold;
    color: #000;
  }

  .post-date {
    font-style: italic;
    font-size: 0.85rem;
    color: #333;
    margin-top: 2px;
  }

  .post-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .tag {
    font-family: 'Calibri', sans-serif;
    font-size: 0.72rem;
    padding: 2px 9px;
    border-radius: 4px;
    border: 1px solid transparent;
    color: #000;
    white-space: nowrap;
  }

  .post-body {
    font-size: 0.97rem;
    color: #000;
    margin-top: 0.75rem;
  }

  /* ── COMMENTS ── */
  .comments {
    margin-top: 1rem;
    border-top: 1px solid rgba(0,0,0,0.12);
  }

  .comment {
    background: #fff;
    border-radius: 4px;
    padding: 0.75rem 1rem;
    margin-top: 0.75rem;
    border: 1px solid rgba(0,0,0,0.10);
  }

  .comment-meta {
    font-size: 0.78rem;
    color: #555;
    margin-bottom: 4px;
  }

  .comment-author { font-weight: bold; color: #000; }
  .comment-date   { font-style: italic; }

  .comment-body {
    font-size: 0.93rem;
    color: #000;
  }

  /* ── GOOGLE PALETTE CLARO 3 / OSCURO 2 ── */
  .color-red     { background: #f4cccc; border-color: #cc0000; }
  .color-orange  { background: #fce5cd; border-color: #e69138; }
  .color-yellow  { background: #fff2cc; border-color: #f1c232; }
  .color-green   { background: #d9ead3; border-color: #38761d; }
  .color-cyan    { background: #d0e0e3; border-color: #134f5c; }
  .color-lblue   { background: #cfe2f3; border-color: #1155cc; }
  .color-blue    { background: #c9daf8; border-color: #1c4587; }
  .color-purple  { background: #d9d2e9; border-color: #20124d; }
  .color-magenta { background: #ead1dc; border-color: #4c1130; }
  .color-gray    { background: #efefef; border-color: #666;    }

  .tag-red     { background: #f4cccc; border-color: #cc0000; }
  .tag-orange  { background: #fce5cd; border-color: #e69138; }
  .tag-yellow  { background: #fff2cc; border-color: #f1c232; }
  .tag-green   { background: #d9ead3; border-color: #38761d; }
  .tag-cyan    { background: #d0e0e3; border-color: #134f5c; }
  .tag-lblue   { background: #cfe2f3; border-color: #1155cc; }
  .tag-blue    { background: #c9daf8; border-color: #1c4587; }
  .tag-purple  { background: #d9d2e9; border-color: #20124d; }
  .tag-magenta { background: #ead1dc; border-color: #4c1130; }
  .tag-gray    { background: #efefef; border-color: #666;    }

  .filter-tag-red     { background: #f4cccc; border-color: #cc0000; }
  .filter-tag-orange  { background: #fce5cd; border-color: #e69138; }
  .filter-tag-yellow  { background: #fff2cc; border-color: #f1c232; }
  .filter-tag-green   { background: #d9ead3; border-color: #38761d; }
  .filter-tag-cyan    { background: #d0e0e3; border-color: #134f5c; }
  .filter-tag-lblue   { background: #cfe2f3; border-color: #1155cc; }
  .filter-tag-blue    { background: #c9daf8; border-color: #1c4587; }
  .filter-tag-purple  { background: #d9d2e9; border-color: #20124d; }
  .filter-tag-magenta { background: #ead1dc; border-color: #4c1130; }
  .filter-tag-gray    { background: #efefef; border-color: #666;    }
</style>
</head>
<body>

<div class="blog-container">

  <header>
    <h1>Mi Blog</h1>
    <p>Hablo de cualquier cosa.</p>
  </header>

  <div class="filter-bar" id="filterBar"></div>

  <div id="postsContainer"></div>

</div>

<script>
const COLORS = ["yellow","green","lblue","blue","purple","cyan","red","orange","magenta","gray"];
const TAG_COLORS = {};
let colorIdx = 0;

function getTagColor(tag) {
  const key = tag.toLowerCase().trim();
  if (!TAG_COLORS[key]) {
    TAG_COLORS[key] = COLORS[colorIdx % COLORS.length];
    colorIdx++;
  }
  return TAG_COLORS[key];
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' });
}

/* ══════════════════════════════════════════
   POSTS — editá este array para agregar entradas
   Campos: id, title, date, body, tags[], color, comments[]
   Comentarios: { author, date, body }
   Colores disponibles: red, orange, yellow, green, cyan, lblue, blue, purple, magenta, gray
══════════════════════════════════════════ */
const posts = [
  {
    id: 1,
    title: "Ideas estocásticas",
    date: "2026-05-20T10:00:00",
    body: `Hay patrones de conducta. Hay patrones de consumo. Hay hábitos.
    Un patrón también es un modelo que sirve de muestra para sacar otra cosa igual.
    Hay patrones hermosos en la matemática, en las secuencias, en la geometría, en la simetría.
    Hay patrones mucho más obvios: en los tejidos, en el arte, los mosaicos, las mandalas. En la arquitectura, el diseño, el lenguaje, la rima.
    Podemos encontrar formas en la madera, el marmol, las piedras, las nubes y en garabatos.
    Hay patrones en la música, que son rítmicos, melódicos, armónicos. El cerebro detecta regularidades. La repetición crea expectativa; la variación controlada produce interés.
    Las ilusiones ópticas funcionan.

    El sentido común es un patrón.

    En fin, la cosa es: evolucionamos porque encontramos patrones, somos una maquina encontradora de patrones en todos lados. Por eso, el ser humano es tan malo para tomar muestras aleatorias: los patrones son todo lo contrario a la aleatoriedad.
    Y bueno, aleatorio no es lo mismo que al azar.`,
    image: "fotos/patron_racing.jpg",
    tags: ["estadística"],
    color: "yellow",
    comments: [
      // { author: "Victoria", date: "2026-05-20T10:00:00", body: "PD: hablo de cualquier cosa." }
    ]
  },
//   {
//     id: 2,
//     title: "Primeros pasos con pandas y numpy",
//     date: "2025-03-18T14:30:00",
//     body: "Hoy estuve explorando datasets de clima con pandas. Lo más útil fue aprender a usar groupby y apply para resumir datos meteorológicos por estación. Les comparto el flujo básico que usé...",
//     tags: ["ciencia de datos", "python"],
//     color: "lblue",
//     comments: []
//   },
//   {
//     id: 3,
//     title: "Vacaciones en la Patagonia",
//     date: "2025-04-02T08:00:00",
//     body: "Estuvimos una semana recorriendo la Patagonia. El Nahuel Huapi fue una locura, el agua de un azul increíble. Hicimos trekking en el Cerro López y el Refugio Lynch. Imposible no desconectarse.",
//     tags: ["vacaciones", "viajes"],
//     color: "green",
//     comments: [
//       { author: "Martín", date: "2025-04-05T17:00:00", body: "¡Qué envidia! ¿Qué sendero recomendás más?" },
//       { author: "Yo",     date: "2025-04-05T19:00:00", body: "El del Cerro López es imperdible, aunque es bastante exigente. ¡Vale la pena cada paso!" }
//     ]
//   },
//   {
//     id: 4,
//     title: "Redes neuronales desde cero",
//     date: "2025-05-01T11:00:00",
//     body: "Implementé una red neuronal simple con numpy puro, sin usar PyTorch ni TensorFlow. El objetivo era entender el backpropagation desde adentro. La parte más interesante fue entender cómo fluyen los gradientes.",
//     tags: ["machine learning", "python"],
//     color: "purple",
//     comments: []
//   }
];
/* ══════════════════════════════════════════ */

let activeFilter = "todos";

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  const allTags = new Set();
  posts.forEach(p => p.tags.forEach(t => allTags.add(t.toLowerCase().trim())));

  let html = `<span class="filter-label">Filtrar:</span>
    <span class="filter-tag ${activeFilter==='todos'?'active':''}"
      style="background:#eee;border:1px solid #aaa;"
      onclick="filterPosts('todos')">Todos</span>`;

  allTags.forEach(tag => {
    const c = getTagColor(tag);
    html += `<span class="filter-tag filter-tag-${c} ${activeFilter===tag?'active':''}"
      onclick="filterPosts('${escHtml(tag)}')">${escHtml(tag)}</span>`;
  });

  bar.innerHTML = html;
}

function renderPosts() {
  const container = document.getElementById("postsContainer");
  const filtered = activeFilter === "todos"
    ? posts
    : posts.filter(p => p.tags.map(t => t.toLowerCase().trim()).includes(activeFilter));

  if (filtered.length === 0) {
    container.innerHTML = `<p style="color:#666;font-style:italic">No hay entradas con ese tag.</p>`;
    return;
  }

  container.innerHTML = filtered.slice().reverse().map(post => {
    const tagsHtml = post.tags.map(t => {
      const c = getTagColor(t);
      return `<span class="tag tag-${c}">${escHtml(t)}</span>`;
    }).join("");

    const commentsHtml = post.comments.length
      ? `<div class="comments">${post.comments.map(c => `
          <div class="comment">
            <div class="comment-meta">
              <span class="comment-author">${escHtml(c.author)}</span>
              <span class="comment-date"> · ${fmtDate(c.date)}</span>
            </div>
            <div class="comment-body">${escHtml(c.body)}</div>
          </div>`).join("")}
        </div>`
      : "";

    return `
    <div class="post color-${post.color}" id="post-${post.id}">
      <div class="post-header">
        <div class="post-title-block">
          <div class="post-title">${escHtml(post.title)}</div>
          <div class="post-date">${fmtDate(post.date)}</div>
        </div>
        <div class="post-tags">${tagsHtml}</div>
      </div>
      <div class="post-body">${escHtml(post.body).replace(/\n/g, '<br>')}</div>
      ${post.image ? `<img src="${post.image}" style="margin-top:1rem; max-width:100%; border-radius:4px;">` : ""}
      ${commentsHtml}
    </div>`;
  }).join("");
}

function filterPosts(tag) {
  activeFilter = tag;
  renderFilterBar();
  renderPosts();
}

renderFilterBar();
renderPosts();
</script>
</body>
</html>
